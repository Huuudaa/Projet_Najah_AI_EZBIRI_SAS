<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najah-AI — Mon engagement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/main.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar">
      <div>
        <div class="topbar-title">Mon engagement</div>
        <div class="topbar-sub">Historique complet de mes indicateurs sur 12 semaines</div>
      </div>
    </header>
    <div class="content" id="content">
      <div class="loading"><span class="spinner"></span> Chargement…</div>
    </div>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script>
let chart1 = null, chart2 = null;

async function init() {
  const user = await requireAuth("etudiant");
  if (!user) return;
  document.getElementById("sidebar").innerHTML = buildSidebar("etudiant", "/mon_engagement.html", user);
  const d = await apiFetch("/dashboard/etudiant");
  if (!d || d.error) { document.getElementById("content").innerHTML = `<div class="empty-state">${d?.error||"Erreur"}</div>`; return; }
  render(d);
}

function render(d) {
  const evo = d.evolution || [];
  const moy = evo.length ? Math.round(evo.reduce((s,w)=>s+w.score,0)/evo.length) : 0;
  const best = evo.length ? Math.max(...evo.map(w=>w.score)) : 0;
  const worst = evo.length ? Math.min(...evo.map(w=>w.score)) : 0;

  document.getElementById("content").innerHTML = `
    <div class="stats-grid">
      <div class="stat-card blue">
        <div class="stat-label">Score actuel</div>
        <div class="stat-value">${d.score_actuel}</div>
        <div class="stat-sub">${d.label}</div>
      </div>
      <div class="stat-card sage">
        <div class="stat-label">Moyenne</div>
        <div class="stat-value">${moy}</div>
        <div class="stat-sub">sur 12 semaines</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">Meilleur score</div>
        <div class="stat-value">${best}</div>
        <div class="stat-sub">toutes semaines</div>
      </div>
      <div class="stat-card rose">
        <div class="stat-label">Score le plus bas</div>
        <div class="stat-value">${worst}</div>
        <div class="stat-sub">à travailler</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-header">
          <div class="card-title">Score d'engagement hebdomadaire</div>
        </div>
        <canvas id="chart1" height="90"></canvas>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">Temps passé (min) et interactions</div>
        </div>
        <canvas id="chart2" height="90"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">Tableau de bord hebdomadaire</div></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Semaine</th><th>Score</th><th>Temps (min)</th><th>Interactions</th></tr>
          </thead>
          <tbody>
            ${evo.map(w => `<tr>
              <td>Semaine ${w.week}</td>
              <td><span style="font-weight:600;color:${scoreColor(w.score)}">${w.score}</span></td>
              <td>${w.time}</td>
              <td>${w.interactions}</td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>`;

  buildCharts(evo);
}

function buildCharts(evo) {
  if (chart1) chart1.destroy();
  if (chart2) chart2.destroy();
  const labels = evo.map(w=>`S${w.week}`);
  const base = { responsive:true, plugins:{legend:{display:false}},
    scales:{ x:{grid:{color:"#f0ece6"},ticks:{font:{size:11},color:"#8A8078"}},
             y:{grid:{color:"#f0ece6"},ticks:{font:{size:11},color:"#8A8078"}} } };

  chart1 = new Chart(document.getElementById("chart1"), {
    type:"line",
    data:{ labels, datasets:[{ label:"Score", data:evo.map(w=>w.score),
      borderColor:"#7BA7C4", backgroundColor:"rgba(123,167,196,.08)",
      borderWidth:2, pointRadius:3, fill:true, tension:.3 }] },
    options:{...base, scales:{...base.scales, y:{...base.scales.y, min:0, max:100}}}
  });

  chart2 = new Chart(document.getElementById("chart2"), {
    type:"bar",
    data:{ labels, datasets:[
      { label:"Temps (min)", data:evo.map(w=>w.time), backgroundColor:"rgba(159,196,180,.7)", borderRadius:4 },
      { label:"Interactions", data:evo.map(w=>w.interactions), backgroundColor:"rgba(212,169,106,.7)", borderRadius:4 }
    ]},
    options:{...base, plugins:{legend:{display:true,labels:{font:{size:11},color:"#8A8078",boxWidth:12}}}}
  });
}

init();
</script>
</body>
</html>
